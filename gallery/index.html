      crossorigin="anonymous"

    <script>
      $(document).ready(function () {
        // Explicitly disable magnificPopup for js-popup-video links
        if (typeof $.magnificPopup !== "undefined") {
          $(".js-popup-video").magnificPopup({ disableOn: () => false });
        }

        // Ensure no existing event listeners interfere
        $(".js-popup-video")
          .off("click")
          .on("click", function (e) {
            e.preventDefault();
            e.stopImmediatePropagation(); // Stop other handlers from interfering

            // Extract video ID from URL
            var videoUrl = $(this).attr("href");
            var videoId = videoUrl.split("v=")[1];
            var ampersandPosition = videoId.indexOf("&");
            if (ampersandPosition !== -1) {
              videoId = videoId.substring(0, ampersandPosition);
            }
            var embedUrl =
              "https://www.youtube.com/embed/" + videoId + "?autoplay=1&rel=0";

            // Reset and set iframe src
            $("#video-frame").attr("src", "");
            $("#video-frame").attr("src", embedUrl);

            // Show modal with centering
            $(".video-modal")
              .css({
                display: "flex",
                "justify-content": "center",
                "align-items": "center",
              })
              .hide()
              .fadeIn();
          });

        // Close modal on clicking the close button
        $(".close-modal")
          .off("click")
          .on("click", function (e) {
            e.stopImmediatePropagation();
            $(".video-modal").fadeOut();
            $("#video-frame").attr("src", "");
          });

        // Close modal on clicking outside the video
        $(".video-modal")
          .off("click")
          .on("click", function (e) {
            if ($(e.target).is(".video-modal")) {
              $(".video-modal").fadeOut();
              $("#video-frame").attr("src", "");
            }
          });

        // Ensure window click doesn't interfere with modal content
        $(window)
          .off("click")
          .on("click", function (e) {
            if ($(e.target).is(".video-modal")) {
              $(".video-modal").fadeOut();
              $("#video-frame").attr("src", "");
            }
          });
      });
    </script>
